<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loud Crackers</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#ffebee;
            text-align:center;
        }

        header{
            background:#d50000;
            color:white;
            padding:20px;
        }

        nav{
            background:#222;
            padding:15px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
            font-size:18px;
            font-weight:bold;
        }

        nav a:hover{
            color:yellow;
        }

        h2{
            margin:30px 0;
            color:#b71c1c;
        }

        .container{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            padding:20px;
        }

        .card{
            width:250px;
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            color:green;
            font-size:22px;
            margin:10px 0;
        }

        .stars{
            color:gold;
            font-size:18px;
            margin-bottom:10px;
        }

        button{
            background:#d50000;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#b71c1c;
        }

        footer{
            background:#222;
            color:white;
            padding:15px;
            margin-top:30px;
        }

        @media(max-width:600px){
            .card{
                width:90%;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>💥 Loud Crackers 💥</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="Anaar.html">Anaar</a>
        <a href="ground-spinners.html">Ground Spinners</a>
    </nav>

    <h2>Popular Loud Crackers</h2>

    <div class="container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1489515217757-5fd1be406fef?q=80&w=600&auto=format&fit=crop" alt="Thunder Bomb">

            <h3>Thunder Bomb</h3>

            <p class="price">₹400</p>

            <p class="stars">★★★★★</p>

            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde?q=80&w=600&auto=format&fit=crop" alt="Big Sound Cracker">

            <h3>Big Sound Cracker</h3>

            <p class="price">₹500</p>

            <p class="stars">★★★★☆</p>

            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=600&auto=format&fit=crop" alt="Mega Blast">

            <h3>Mega Blast</h3>

            <p class="price">₹650</p>

            <p class="stars">★★★★★</p>

            <button>Buy Now</button>
        </div>

    </div>

    <footer>
        <p>© 2026 Crackers Shop Website</p>
    </footer>

</body>
</html>
